name: Secret guard

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan_for_hardcoded_credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Scan for hardcoded credentials
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")
          scan_suffixes = {
              ".php",
              ".js",
              ".jsx",
              ".ts",
              ".tsx",
              ".json",
              ".yml",
              ".yaml",
              ".ini",
              ".env",
              ".py",
              ".sh",
          }
          skip_dirs = {".git", "node_modules", "dist"}
          patterns = [
              re.compile(r"mail->Password\s*=\s*['\"].+?['\"]", re.IGNORECASE),
              re.compile(r"mail->Username\s*=\s*['\"].+?['\"]", re.IGNORECASE),
              re.compile(r"\bSMTP\s*=\s*[^\s#;]+", re.IGNORECASE),
              re.compile(r"\b(ftp|sftp|smtp)[_-]?(password|pass|user|username)\b\s*[:=]\s*['\"].+?['\"]", re.IGNORECASE),
              re.compile(r"\b(password|passwd|secret|token|api[_-]?key|client[_-]?secret)\b\s*[:=]\s*['\"][^'\"]{6,}['\"]", re.IGNORECASE),
          ]

          findings = []

          for path in root.rglob("*"):
              if not path.is_file():
                  continue
              if any(part in skip_dirs for part in path.parts):
                  continue
              if path.suffix.lower() not in scan_suffixes:
                  continue

              try:
                  content = path.read_text(encoding="utf-8", errors="ignore")
              except Exception:
                  continue

              for line_number, line in enumerate(content.splitlines(), start=1):
                  for pattern in patterns:
                      if pattern.search(line):
                          findings.append(f"{path}:{line_number}: {line.strip()}")
                          break

          if findings:
              print("Potential hardcoded credentials detected:")
              for item in findings:
                  print(item)
              sys.exit(1)

          print("No hardcoded credential patterns detected.")
          PY
