name: Deploy Website (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Build and deploy dist over FTP
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, vpn]
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite production bundle
        run: npm run build

      - name: Deploy dist to hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ${{ secrets.FTP_PROTOCOL != '' && secrets.FTP_PROTOCOL || 'ftps' }}
          port: ${{ secrets.FTP_PORT != '' && secrets.FTP_PORT || 21 }}
          local-dir: dist/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.idea/**
            **/.vscode/**
