name: Deploy Website (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Build and deploy dist over FTP
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check VPN/FTP reachability
        id: precheck
        shell: bash
        run: |
          FTP_HOST="${{ secrets.FTP_SERVER }}"
          FTP_PORT="${{ secrets.FTP_PORT != '' && secrets.FTP_PORT || 21 }}"

          if [ -z "$FTP_HOST" ]; then
            echo "FTP_SERVER secret is missing. Skipping deploy."
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if python - <<PY
          import socket
          host = "${FTP_HOST}"
          port = int("${FTP_PORT}")
          sock = socket.create_connection((host, port), timeout=8)
          sock.close()
          print(f"Reachable: {host}:{port}")
          PY
          then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "VPN/FTP is not reachable from runner. Skipping deploy."
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.precheck.outputs.can_deploy == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: steps.precheck.outputs.can_deploy == 'true'
        run: npm ci

      - name: Build Vite production bundle
        if: steps.precheck.outputs.can_deploy == 'true'
        run: npm run build

      - name: Deploy dist to hosting
        if: steps.precheck.outputs.can_deploy == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ${{ secrets.FTP_PROTOCOL != '' && secrets.FTP_PROTOCOL || 'ftps' }}
          port: ${{ secrets.FTP_PORT != '' && secrets.FTP_PORT || 21 }}
          local-dir: dist/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.idea/**
            **/.vscode/**

      - name: Skip deploy (VPN/FTP unavailable)
        if: steps.precheck.outputs.can_deploy != 'true'
        run: echo "Deploy skipped because VPN/FTP is unavailable from this runner."
